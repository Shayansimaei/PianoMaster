<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- iOS 4 gloss gradient -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <!-- Body gradient -->
    <linearGradient id="pianoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- White key gradient -->
    <linearGradient id="whiteKey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <!-- iOS 4 rounded rect shape (squircle) -->
    <clipPath id="squircle">
      <path d="M12,0 L52,0 C58.6,0 64,5.4 64,12 L64,52 C64,58.6 58.6,64 52,64 L12,64 C5.4,64 0,58.6 0,52 L0,12 C0,5.4 5.4,0 12,0 Z"/>
    </clipPath>
  </defs>

  <!-- Background (iOS 4 gloss base) -->
  <rect width="64" height="64" rx="12" ry="12" fill="#4E342C"/>
  <rect width="64" height="64" rx="12" ry="12" fill="url(#gloss)"/>

  <!-- Piano keyboard group, clipped to squircle -->
  <g clip-path="url(#squircle)">
    <!-- Piano body -->
    <rect x="8" y="18" width="48" height="32" rx="3" ry="3" fill="url(#pianoBody)" stroke="#111" stroke-width="0.5"/>

    <!-- White keys (7 full keys in octave pattern) -->
    <rect x="10" y="20" width="6" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>
    <rect x="17" y="20" width="6" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>
    <rect x="24" y="20" width="6" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>
    <rect x="31" y="20" width="6" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>
    <rect x="38" y="20" width="6" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>
    <rect x="45" y="20" width="6" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>
    <rect x="52" y="20" width="5" height="28" rx="0.8" fill="url(#whiteKey)" stroke="#999" stroke-width="0.4"/>

    <!-- Black keys (5) -->
    <rect x="13.5" y="20" width="3.5" height="17" rx="0.8" fill="#222" stroke="#111" stroke-width="0.3"/>
    <rect x="20.5" y="20" width="3.5" height="17" rx="0.8" fill="#222" stroke="#111" stroke-width="0.3"/>
    <rect x="27.5" y="20" width="3.5" height="17" rx="0.8" fill="#222" stroke="#111" stroke-width="0.3"/>
    <rect x="34.5" y="20" width="3.5" height="17" rx="0.8" fill="#222" stroke="#111" stroke-width="0.3"/>
    <rect x="41.5" y="20" width="3.5" height="17" rx="0.8" fill="#222" stroke="#111" stroke-width="0.3"/>

    <!-- White key inner subtle lines for realism -->
    <line x1="16" y1="20" x2="16" y2="48" stroke="#ccc" stroke-width="0.3"/>
    <line x1="23" y1="20" x2="23" y2="48" stroke="#ccc" stroke-width="0.3"/>
    <line x1="30" y1="20" x2="30" y2="48" stroke="#ccc" stroke-width="0.3"/>
    <line x1="37" y1="20" x2="37" y2="48" stroke="#ccc" stroke-width="0.3"/>
    <line x1="44" y1="20" x2="44" y2="48" stroke="#ccc" stroke-width="0.3"/>
    <line x1="51" y1="20" x2="51" y2="48" stroke="#ccc" stroke-width="0.3"/>

    <!-- iOS 4 gloss overlay on top of icon -->
    <rect x="0" y="0" width="64" height="64" fill="url(#gloss)" rx="12"/>
  </g>

  <!-- Outer subtle border for definition -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
</svg>